<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "fonts.dtd">
<fontconfig>
  <alias>
    <family>sans-serif</family>
    <prefer>
      <family>Droid Sans</family>
      <family>Arial</family>
      <family>DejaVu Sans</family>
    </prefer>
  </alias>

  <alias>
    <family>serif</family>
    <prefer>
      <family>Droid Serif</family>
      <family>Times New Roman</family>
      <family>DejaVu Serif</family>
    </prefer>
  </alias>

  <alias>
    <family>monospace</family>
    <prefer>
      <!-- Nerd-patched name first: this is what setup.sh installs. Plain
           "JetBrains Mono" covers a distro/upstream install of the font. -->
      <family>JetBrainsMono Nerd Font</family>
      <family>JetBrains Mono</family>
      <family>Envy Code R</family>
      <family>Consolas</family>
      <!-- Last resort: without a monospace font left in this chain, fontconfig
           falls through to a proportional face (DejaVu Sans). -->
      <family>DejaVu Sans Mono</family>
    </prefer>
  </alias>

  <match target="font">
    <edit mode="assign" name="embeddedbitmap"> <bool>false</bool>        </edit>
    <edit mode="assign" name="antialias">      <bool>true</bool>         </edit>
    <edit mode="assign" name="hinting">        <bool>true</bool>         </edit>
    <edit mode="assign" name="autohint">       <bool>false</bool>        </edit>
    <edit mode="assign" name="rgba">           <const>rgb</const>        </edit>
    <edit mode="assign" name="hintstyle">      <const>hintfull</const>   </edit>
    <edit mode="assign" name="lcdfilter">      <const>lcddefault</const> </edit>
  </match>
</fontconfig>
