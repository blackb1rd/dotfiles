# Desktop apps started by the user systemd session, such as VS Code, inherit
# these values without needing an interactive shell.
# Sourced by: systemctl --user daemon-reload && systemctl --user import-environment

# Locale
LC_ALL=en_US.UTF-8
LC_CTYPE=en_US.UTF-8

# Editor
EDITOR=nvim

# Python
PYENV_ROOT=${HOME}/.pyenv
PYTHONSTARTUP=${HOME}/.pythonrc

# Ruby
RBENV_ROOT=${HOME}/.rbenv

# Go
GOPATH=${HOME}/go

# Rust
RUSTUP_HOME=${HOME}/.rustup
RUSTC_WRAPPER=sccache
SCCACHE_DIR=${HOME}/.cache/sccache
SCCACHE_CACHE_SIZE=10G

# Flutter / Dart
FLUTTER_GIT_URL=ssh://git@github.com/flutter/flutter.git

# Android
ANDROID_HOME=${HOME}/Android/Sdk

# Node
NVM_DIR=${HOME}/.nvm

# C/C++ vcpkg
VCPKG_ROOT=/opt/vcpkg

PATH=${HOME}/bin:${HOME}/.local/bin:/sbin:/snap/bin:${PYENV_ROOT}/shims:${PYENV_ROOT}/bin:${RBENV_ROOT}/bin:${RBENV_ROOT}/shims:${HOME}/.cargo/bin:${GOPATH}/bin:${ANDROID_HOME}/emulator:${ANDROID_HOME}/tools:${ANDROID_HOME}/tools/bin:${ANDROID_HOME}/platform-tools:${HOME}/development/flutter/bin:/usr/lib/dart/bin:/opt/mozjpeg/bin:${VCPKG_ROOT}:${PATH}:${HOME}/.cabal/bin
